name: Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 定义一个全局变量，方便后续统一修改 ComfyUI 的版本
env:
  COMFYUI_VERSION: "0.21.1"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果你的文件名是 Dockerfile.base-image，请取消下行注释
          # file: ./Dockerfile.base-image
          push: true
          build-args: |
            COMFYUI_VERSION=${{ env:COMFYUI_VERSION }}
          # 请将 <YOUR_USERNAME> 替换为你的 Docker Hub 用户名
          # 或者直接使用：${{ secrets.DOCKERHUB_USERNAME }}/ai-npc-base:latest
          tags: |
            ${{ vars.DOCKER_HUB_USERNAME }}/ai-npc-base:torch2.9.1-cu130-py3.12-${{ steps.date.outputs.DATE }}
            ${{ vars.DOCKER_HUB_USERNAME }}/ai-npc-base:torch2.9.1-cu130-py3.12-${{ env.COMFYUI_VERSION }}
          
          # 使用 GitHub 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
